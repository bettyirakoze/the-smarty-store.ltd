<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStore Ltd. | Inventory Management System</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f8fafc;
            --text-dark: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
        }

        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            min-height: 600px;
        }

        header {
            border-bottom: 2px solid var(--border);
            margin-bottom: 30px;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav button {
            background: transparent;
            border: 1px solid var(--border);
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        nav button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Welcome Screen */
        .welcome-section { text-align: center; padding: 80px 20px; }
        .welcome-section h2 { font-size: 3rem; color: var(--primary); margin-bottom: 20px; }
        .welcome-section p { font-size: 1.25rem; color: #64748b; margin-bottom: 40px; }
        .start-btn {
            background: var(--primary);
            color: white;
            padding: 18px 45px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 15px rgba(37, 99, 235, 0.3);
        }

        /* Dashboard & Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f1f5f9; text-align: left; padding: 15px; font-size: 0.9rem; color: #475569; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }
        
        .line-total-cell { font-weight: 600; color: #334155; }
        .total-footer { background: #eff6ff; font-weight: 800; color: var(--primary); font-size: 1.1rem; }

        /* Forms */
        .form-card { max-width: 600px; margin: 0 auto; background: #fdfdfd; padding: 25px; border-radius: 10px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 6px; display: none; }

        .search-container { display: flex; gap: 12px; margin-bottom: 25px; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <header id="main-nav" style="display: none;">
        <h1>SmartStore <span style="color: var(--primary);">System</span></h1>
        <nav>
            <button id="nav-dashboard" onclick="changeView('dashboard')">Dashboard</button>
            <button id="nav-add" onclick="changeView('add')">Add Product</button>
            <button id="nav-update" onclick="changeView('update')">Update Stock</button>
        </nav>
    </header>

    <section id="welcome" class="view active">
        <div class="welcome-section">
            <h2>SmartStore Ltd.</h2>
            <p>Professional inventory management with real-time calculations.</p>
            <button class="start-btn" onclick="launchApp()">Launch Application</button>
        </div>
    </section>

    <main id="dashboard" class="view">
        <div class="search-container">
            <input type="text" id="mainSearch" placeholder="Search by name or category...">
            <button class="btn-action" onclick="performSearch()">Search</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Product Name</th>
                    <th>Category</th>
                    <th>Qty</th>
                    <th>Unit Price</th>
                    <th>Line Total</th> <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventory-rows"></tbody>
            <tfoot>
                <tr class="total-footer">
                    <td colspan="5" style="text-align: right;">Grand Total Inventory Value:</td>
                    <td id="grand-total-val" colspan="2">$0.00</td>
                </tr>
            </tfoot>
        </table>
    </main>

    <section id="add" class="view">
        <div class="form-card">
            <h2>Register New Product</h2>
            <div class="form-group">
                <label>Product ID</label>
                <input type="text" id="new-id">
                <div id="duplicate-err" class="error-msg">This ID already exists!</div>
            </div>
            <div class="form-group"><label>Product Name</label><input type="text" id="new-name"></div>
            <div class="form-group"><label>Category</label><input type="text" id="new-cat"></div>
            <div class="form-group"><label>Quantity</label><input type="number" id="new-qty" min="1"></div>
            <div class="form-group"><label>Price ($)</label><input type="number" id="new-price" min="0.01" step="0.01"></div>
            <button class="btn-action" style="width: 100%;" onclick="saveNewProduct()">Add to Inventory</button>
        </div>
    </section>

    <section id="update" class="view">
        <div class="form-card">
            <h2>Modify Product Details</h2>
            <div class="search-container">
                <input type="text" id="lookup-id" placeholder="Enter Product ID...">
                <button class="btn-action" onclick="searchForEdit()">Find</button>
            </div>
            <div id="edit-panel" style="display: none; border-top: 1px solid var(--border); padding-top: 20px;">
                <p><strong>Modifying:</strong> <span id="edit-label-name" style="color: var(--primary);"></span></p>
                <div class="form-group"><label>New Quantity</label><input type="number" id="edit-qty"></div>
                <div class="form-group"><label>New Price ($)</label><input type="number" id="edit-price" step="0.01"></div>
                <button class="btn-action" style="width: 100%;" onclick="submitUpdate()">Save Changes</button>
            </div>
        </div>
    </section>
</div>

<script>
    let inventory = [
        { id: "101", name: "High-End Laptop", category: "Electronics", qty: 10, price: 1200.00 },
        { id: "102", name: "Wireless Keyboard", category: "Accessories", qty: 50, price: 45.00 },
        { id: "103", name: "Ergonomic Chair", category: "Furniture", qty: 5, price: 300.00 }
    ];

    function launchApp() {
        document.getElementById('main-nav').style.display = 'flex';
        changeView('dashboard');
    }

    function changeView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        const activeNav = document.getElementById('nav-' + viewId);
        if (activeNav) activeNav.classList.add('active');
        if (viewId === 'dashboard') updateDisplay(inventory);
    }

    function updateDisplay(data) {
        const list = document.getElementById('inventory-rows');
        list.innerHTML = "";
        let grandTotal = 0;

        data.forEach(item => {
            const lineTotal = item.qty * item.price; // Calculation for each item
            grandTotal += lineTotal;

            const row = `<tr>
                <td>${item.id}</td>
                <td>${item.name}</td>
                <td>${item.category}</td>
                <td>${item.qty}</td>
                <td>$${item.price.toFixed(2)}</td>
                <td class="line-total-cell">$${lineTotal.toFixed(2)}</td> <td><button class="btn-del" onclick="removeItem('${item.id}')">Delete</button></td>
            </tr>`;
            list.innerHTML += row;
        });

        document.getElementById('grand-total-val').innerText = `$${grandTotal.toFixed(2)}`;
    }

    function saveNewProduct() {
        const id = document.getElementById('new-id').value;
        const name = document.getElementById('new-name').value;
        const cat = document.getElementById('new-cat').value;
        const qty = parseInt(document.getElementById('new-qty').value);
        const price = parseFloat(document.getElementById('new-price').value);

        if (!id || !name || isNaN(qty) || isNaN(price) || qty < 0 || price < 0) {
            alert("Error: Invalid Input.");
            return;
        }

        if (inventory.some(p => p.id === id)) {
            document.getElementById('duplicate-err').style.display = 'block';
            return;
        }

        inventory.push({ id, name, category: cat, qty, price });
        document.getElementById('duplicate-err').style.display = 'none';
        alert("Product added.");
        changeView('dashboard');
    }

    function removeItem(id) {
        if (confirm(`Delete Product ${id}?`)) {
            inventory = inventory.filter(p => p.id !== id);
            updateDisplay(inventory);
        }
    }

    function searchForEdit() {
        const sid = document.getElementById('lookup-id').value;
        const found = inventory.find(p => p.id === sid);
        if (found) {
            document.getElementById('edit-panel').style.display = 'block';
            document.getElementById('edit-label-name').innerText = found.name;
            document.getElementById('edit-qty').value = found.qty;
            document.getElementById('edit-price').value = found.price;
        } else {
            alert("ID not found.");
        }
    }

    function submitUpdate() {
        const sid = document.getElementById('lookup-id').value;
        const idx = inventory.findIndex(p => p.id === sid);
        inventory[idx].qty = parseInt(document.getElementById('edit-qty').value);
        inventory[idx].price = parseFloat(document.getElementById('edit-price').value);
        alert("Updated.");
        changeView('dashboard');
    }

    function performSearch() {
        const term = document.getElementById('mainSearch').value.toLowerCase();
        const filtered = inventory.filter(p => p.name.toLowerCase().includes(term) || p.category.toLowerCase().includes(term));
        updateDisplay(filtered);
    }
</script>
</body>
</html>
