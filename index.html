<!DOCTYPE html>
<html>
<head>
<title>SmartStore Pro Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: #0b1220;
  color: white;
}

/* ================= WELCOME ================= */
#welcome {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #0f172a, #111827);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.welcome-box {
  text-align: center;
  background: #111827;
  padding: 50px;
  border-radius: 16px;
  border: 1px solid #1f2937;
  width: 380px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.welcome-box h1 {
  color: #22c55e;
  margin-bottom: 10px;
  font-size: 28px;
}

.welcome-box p {
  color: #94a3b8;
  margin-bottom: 15px;
}

.welcome-box button {
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.welcome-box button:hover {
  background: #16a34a;
}

/* ================= SIDEBAR ================= */
.sidebar {
  position: fixed;
  width: 240px;
  height: 100vh;
  background: #0f172a;
  padding: 20px;
}

.logo {
  font-size: 20px;
  color: #22c55e;
  margin-bottom: 30px;
}

.nav div {
  padding: 10px;
  margin: 5px 0;
  cursor: pointer;
}

/* ================= MAIN ================= */
.main {
  margin-left: 240px;
  padding: 20px;
  display: none;
}

/* ================= TOP ================= */
.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  margin: 5px;
  background: #0f172a;
  color: white;
  border: 1px solid #374151;
}

button {
  padding: 10px;
  border: none;
  cursor: pointer;
}

.add { background: #22c55e; }
.search { background: orange; }
.edit { background: #3b82f6; }
.delete { background: red; }

/* ================= TABLE ================= */
table {
  width: 100%;
  background: #111827;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #1f2937;
}

thead { background: #1f2937; }

/* Highlight total */
td:nth-child(6){
  color: #22c55e;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome">
  <div class="welcome-box">
    <h1>🛒 SmartStore</h1>
    <p>Inventory Management System</p>
    <p>Manage your products efficiently and easily</p>
    <button onclick="startApp()">Enter Dashboard</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">SmartStore</div>
  <div class="nav">
    <div>Dashboard</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <h2>Inventory</h2>

    <div>
      <input id="searchId" placeholder="Search">
      <button class="search" onclick="searchProduct()">Search</button>
      <button onclick="display(products)">Reset</button>
    </div>
  </div>

  <!-- ADD PRODUCT -->
  <div>
    <input id="id" placeholder="ID">
    <input id="name" placeholder="Name">
    <input id="category" placeholder="Category">
    <input id="qty" type="number" placeholder="Qty">
    <input id="price" type="number" placeholder="Price">
    <button class="add" onclick="addProduct()">Add</button>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Qty</th>
        <th>Price</th>
        <th>Total</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

</div>

<script>

function startApp(){
  document.getElementById("welcome").style.display="none";
  document.querySelector(".main").style.display="block";
}

let products = [
  {id:"1", name:"Phone", category:"Electronics", qty:10, price:300},
  {id:"2", name:"Shoes", category:"Fashion", qty:20, price:50},
  {id:"3", name:"Book", category:"Education", qty:15, price:10}
];

function display(list = products){
  let table = document.getElementById("table");
  table.innerHTML="";

  list.forEach(p=>{
    table.innerHTML += `
      <tr>
        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>${p.category}</td>
        <td>${p.qty}</td>
        <td>${p.price}</td>
        <td>${p.qty * p.price}</td>
        <td>
          <button class="edit" onclick="editProduct('${p.id}')">Edit</button>
          <button class="delete" onclick="deleteProduct('${p.id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

function addProduct(){
  let id=v("id"), name=v("name"), cat=v("category"),
      qty=v("qty"), price=v("price");

  if(!id||!name||!cat||!qty||!price) return;

  if(products.find(p=>p.id===id)) return alert("Duplicate ID");

  products.push({id,name,category:cat,qty,price});
  display();
}

function deleteProduct(id){
  if(!confirm("Delete this product?")) return;
  products = products.filter(p=>p.id!==id);
  display();
}

function editProduct(id){
  let p = products.find(p=>p.id===id);
  let qty = prompt("Qty", p.qty);
  let price = prompt("Price", p.price);

  if(qty) p.qty = qty;
  if(price) p.price = price;

  display();
}

function searchProduct(){
  let val = v("searchId").toLowerCase();

  let result = products.filter(p =>
    p.id.includes(val) ||
    p.name.toLowerCase().includes(val) ||
    p.category.toLowerCase().includes(val)
  );

  display(result);
}

function v(id){
  return document.getElementById(id).value;
}

display();

</script>

</body>
</html>
